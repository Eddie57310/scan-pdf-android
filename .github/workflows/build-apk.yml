name: Build Android APK

# 触发时机：
#  - push 到 main：自动编译并把 APK 作为构件(artifact)上传，可在 Actions 页面下载
#  - 打形如 v1.0.0 的 tag：额外创建一个 Release，并把 APK 附在 Release 上
#  - 手动触发：Actions 页面点 "Run workflow"
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write # 允许创建 Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.7
          channel: stable
          cache: true

      - name: 拉取依赖
        run: flutter pub get

      - name: 静态分析
        run: flutter analyze

      - name: 编译 Release APK
        run: flutter build apk --release

      - name: 上传 APK 构件
        uses: actions/upload-artifact@v4
        with:
          name: scan-pdf-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: 打 tag 时发布 Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
